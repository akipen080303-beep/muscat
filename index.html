<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集中作業環境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .workspace {
            width: 1400px;
            height: 900px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            position: relative;
            padding: 30px;
            display: grid;
            grid-template-areas: 
                "notebook textbook textbook"
                "notebook pomodoro pomodoro"
                "plan plan plan";
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 0.4fr;
            gap: 20px;
        }

        /* ノートエリア (左側) */
        .notebook {
            grid-area: notebook;
            background: linear-gradient(180deg, #ffffff 0%, #f8f9ff 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 25px;
            display: flex;
            flex-direction: column;
            cursor: move;
            border: 2px solid #e8ecf4;
            transition: all 0.3s ease;
        }

        .notebook:hover {
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .notebook h2 {
            color: #4a5568;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .notebook textarea {
            flex: 1;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            background: rgba(255,255,255,0.8);
            font-family: inherit;
        }

        .notebook textarea:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.1);
        }

        /* 教材スペース (右上) */
        .textbook {
            grid-area: textbook;
            background: linear-gradient(135deg, #fffaf0 0%, #f0f8ff 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 20px;
            cursor: move;
            border: 4px solid #ffd700;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .textbook::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffd700, #ffed4a, #ffd700);
            border-radius: 20px;
            z-index: -1;
            padding: 2px;
        }

        .textbook h2 {
            color: #b8860b;
            font-size: 18px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }

        .textbook iframe {
            width: 100%;
            height: 70%;
            border: none;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .textbook-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* ポモドーロタイマー (右下) */
        .pomodoro {
            grid-area: pomodoro;
            background: linear-gradient(135deg, #fff5f5 0%, #ffeef0 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            cursor: move;
            text-align: center;
            border: 3px solid #ff6b6b;
        }

        .pomodoro h2 {
            color: #c53030;
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .tomato {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #ff4757 0%, #ff6b6b 50%, #ff8e8e 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
        }

        .tomato::before {
            content: '🍅';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
        }

        .time-display {
            font-size: 48px;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .pomodoro-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .btn-start {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72,187,120,0.3);
        }

        .btn-reset {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(237,137,54,0.3);
        }

        /* 作業計画 (左下横長) */
        .plan {
            grid-area: plan;
            background: linear-gradient(90deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 25px;
            cursor: move;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            border: 2px solid #cbd5e0;
        }

        .plan-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .plan-section h3 {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 700;
            border-left: 4px solid #4299e1;
            padding-left: 12px;
        }

        .plan-section textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }

        /* ドラッグハンドル */
        .drag-handle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            user-select: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-handle::before {
            content: '⋮⋮';
        }

        /* 勉強机風の影と質感 */
        .workspace::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 0%, transparent 50%);
            border-radius: 20px;
            pointer-events: none;
        }

        /* ホバー時のカードエフェクト */
        .notebook:hover,
        .textbook:hover,
        .pomodoro:hover,
        .plan:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="workspace" id="workspace">
        <!-- ノートエリア -->
        <div class="notebook" draggable="true">
            <div class="drag-handle"></div>
            <h2>📝 ノート</h2>
            <textarea placeholder="ここにメモを記入...&#10;・重要なポイント&#10;・気づき&#10;・次のアクション"></textarea>
        </div>

        <!-- 教材スペース -->
        <div class="textbook" draggable="true">
            <div class="drag-handle"></div>
            <h2>📚 教材スペース</h2>
            <input type="url" class="textbook-input" placeholder="教材URLを入力 (例: YouTube, PDFなど)" value="https://www.youtube.com/embed/dQw4w9WgXcQ">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <!-- ポモドーロタイマー -->
        <div class="pomodoro" draggable="true">
            <div class="drag-handle"></div>
            <h2>⏱️ ポモドーロ</h2>
            <div class="tomato"></div>
            <div class="time-display" id="timer">25:00</div>
            <div class="pomodoro-controls">
                <button class="btn btn-start" id="startBtn">▶️ Start</button>
                <button class="btn btn-reset" id="resetBtn">🔄 Reset</button>
            </div>
        </div>

        <!-- 作業計画 -->
        <div class="plan" draggable="true">
            <div class="drag-handle" style="right: 15px;"></div>
            <div class="plan-section">
                <h3>🎯 今日の目標</h3>
                <textarea placeholder="今日の3つの最重要タスク&#10;&#10;1. &#10;2. &#10;3. "></textarea>
            </div>
            <div class="plan-section">
                <h3>📋 目次</h3>
                <textarea placeholder="学習内容のチェックリスト&#10;&#10;□ 導入&#10;□ 基本概念&#10;□ 演習"></textarea>
            </div>
            <div class="plan-section">
                <h3>⏰ 時間割</h3>
                <textarea placeholder="今日のスケジュール&#10;09:00-10:00 学習1&#10;10:00-10:25 ポモドーロ&#10;10:25-10:30 休憩"></textarea>
            </div>
        </div>
    </div>

    <script>
        // 簡易ドラッグ機能（デザイン確認用）
        const draggables = document.querySelectorAll('[draggable="true"]');
        
        draggables.forEach(draggable => {
            draggable.addEventListener('dragstart', (e) => {
                e.dataTransfer.effectAllowed = 'move';
                draggable.style.opacity = '0.5';
            });
            
            draggable.addEventListener('dragend', (e) => {
                draggable.style.opacity = '1';
            });
        });

        const workspace = document.getElementById('workspace');
        workspace.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        workspace.addEventListener('drop', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
