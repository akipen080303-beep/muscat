<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>集中作業環境プロトタイプ - Muscat Edition</title>
<style>
  /* --- Base & Background Decorations --- */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  body {
    background-color: #fdfdfd;
    background-image: 
      radial-gradient(#e0e0e0 1px, transparent 1px),
      url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d1d1d1' fill-opacity='0.2'%3E%3Cpath d='M10 10l5 5m-5 0l5-5M80 20c0 5-5 5-5 10s5 5 5 10M20 80h10v10H20zM50 50l2-2 2 2-2 2-2-2z' stroke='%23d1d1d1' stroke-width='0.5' fill='none'/%3E%3Ccircle cx='90' cy='90' r='2'/%3E%3Cpath d='M40 10c2 0 3 2 3 4s-1 4-3 4-3-2-3-4 1-4 3-4z'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 40px 40px, 200px 200px;
    font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
    color: #444;
    height: 100vh;
    padding: 20px 50px;
    min-width: 1200px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* --- Layout Structure --- */
  .top-row {
    display: flex;
    gap: 30px;
    height: 60%;
  }

  .bottom-row {
    display: flex;
    gap: 30px;
    height: 35%;
    align-items: flex-end;
    padding: 0 40px 20px 40px; /* 左右に余白 */
  }

  .card {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    position: relative;
    transition: transform 0.2s;
  }

  /* --- ① ノート (左上・縦長) --- */
  .note-space {
    flex: 0 0 350px; /* 幅固定、縦長 */
    background-color: #fffef0; /* クリーム色 */
    border: 1px solid #e0d8c0;
    display: flex;
    flex-direction: column;
    padding: 40px 20px 20px 60px; /* 左側に余白 */
    overflow: hidden;
  }

  /* ノートの赤い縦線 */
  .note-space::before {
    content: "";
    position: absolute;
    left: 45px;
    top: 0;
    bottom: 0;
    width: 2px;
    background-color: #ffb3b3;
  }

  .note-space h2 {
    font-size: 18px;
    color: #a0a0a0;
    margin-bottom: 10px;
    font-family: serif;
  }

  .note-space textarea {
    flex-grow: 1;
    width: 100%;
    border: none;
    background: repeating-linear-gradient(transparent, transparent 31px, #d1e5f0 31px, #d1e5f0 32px);
    line-height: 32px;
    font-size: 16px;
    outline: none;
    resize: none;
    color: #333;
    padding-top: 4px;
  }

  /* --- ② 教材スペース (右上・横長・額縁) --- */
  .study-space {
    flex: 1;
    /* 豪華な金色の額縁 */
    border: 18px solid;
    border-image: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
    box-shadow: 
      0 15px 35px rgba(0,0,0,0.2),
      inset 0 0 10px rgba(0,0,0,0.5);
    background: #333;
    overflow: hidden;
  }

  .study-space iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }

  /* --- ④ 作業計画 (左下・広め) --- */
  .plan-space {
    flex: 2; /* タイマーより広く設定 */
    height: 100%;
    padding: 20px;
    border: 1px solid #eee;
  }

  .plan-space h2 {
    font-size: 20px;
    margin-bottom: 15px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .plan-columns {
    display: flex;
    gap: 15px;
    height: calc(100% - 40px);
  }

  .plan-col {
    flex: 1;
    background: #fdfdfd;
    border-radius: 10px;
    padding: 12px;
    border: 1px solid #f0f0f0;
  }

  .plan-col h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: #888;
    text-align: center;
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
  }

  .plan-col ul {
    list-style: none;
    font-size: 14px;
    line-height: 1.8;
  }

  /* --- ③ ポモドーロタイマー (右下・マスカット) --- */
  .timer-space {
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .muscat-container {
    position: relative;
    width: 220px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* マスカットの粒々デザイン */
  .muscat-bunch {
    position: absolute;
    width: 100%;
    height: 100%;
  }

  .grape {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #d9f2a7, #85bb25);
    box-shadow: inset -2px -2px 6px rgba(0,0,0,0.1), 2px 4px 8px rgba(0,0,0,0.1);
    width: 60px;
    height: 65px;
  }

  /* 粒の配置 */
  .g1 { top: 10%; left: 35%; }
  .g2 { top: 25%; left: 15%; }
  .g3 { top: 25%; left: 55%; }
  .g4 { top: 50%; left: 25%; }
  .g5 { top: 50%; left: 50%; }
  .g6 { top: 70%; left: 38%; width: 55px; height: 60px; }

  /* 茎 */
  .stem {
    position: absolute;
    top: -10px;
    left: 48%;
    width: 8px;
    height: 30px;
    background: #6d8c32;
    border-radius: 4px;
    transform: rotate(-10deg);
    z-index: -1;
  }

  .time-display {
    position: relative;
    z-index: 10;
    font-size: 42px;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    font-family: 'Courier New', Courier, monospace;
  }

  .timer-controls {
    position: absolute;
    bottom: -40px;
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 5px 15px;
    border: none;
    border-radius: 15px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    background: #fff;
    color: #6d8c32;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    border: 1px solid #d9f2a7;
  }

</style>
</head>
<body>

  <!-- 背景装飾用の落書き (SVGイメージの代替として配置可能) -->

  <div class="top-row">
    <!-- ① ノートスペース -->
    <div class="card note-space">
      <h2>Notes</h2>
      <textarea placeholder="集中してメモを取りましょう..."></textarea>
    </div>

    <!-- ② 教材スペース -->
    <div class="card study-space">
      <iframe src="about:blank"></iframe>
    </div>
  </div>

  <div class="bottom-row">
    <!-- ④ 作業計画スペース -->
    <div class="card plan-space">
      <h2>Today's Tasks</h2>
      <div class="plan-columns">
        <div class="plan-col">
          <h3>Goals</h3>
          <ul>
            <li>・メインタスクの完了</li>
            <li>・重要項目の整理</li>
          </ul>
        </div>
        <div class="plan-col">
          <h3>To-Do</h3>
          <ul>
            <li>□ 資料の読み込み</li>
            <li>□ 構成案の作成</li>
          </ul>
        </div>
        <div class="plan-col">
          <h3>Time</h3>
          <ul>
            <li>09:00 Focus</li>
            <li>12:00 Lunch</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- ③ マスカットタイマー -->
    <div class="timer-space">
      <div class="muscat-container">
        <div class="stem"></div>
        <div class="muscat-bunch">
          <div class="grape g1"></div>
          <div class="grape g2"></div>
          <div class="grape g3"></div>
          <div class="grape g4"></div>
          <div class="grape g5"></div>
          <div class="grape g6"></div>
        </div>
        <div class="time-display">25:00</div>
        <div class="timer-controls">
          <button class="btn">START</button>
          <button class="btn">RESET</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // JavaScript logic remains unchanged as per instruction.
  </script>
</body>
</html>
