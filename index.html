<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Dashboard - Muscat Edition</title>
    <style>
        :root {
            --bg-color: #f6f1e8;
            --card-bg: #ffffff;
            --accent-yellow: #f2c94c;
            --text-color: #3d3d3d;
            --muscat-green: #b5e48c;
            --muscat-dark: #76c893;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            height: 100vh;
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        /* Background Decorations */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20 L20 10 M80 80 L90 70 M30 70 Q 40 60 50 70 T 70 70' stroke='%233d3d3d' stroke-width='1' fill='none'/%3E%3Ccircle cx='15' cy='85' r='3' fill='%23f2c94c'/%3E%3Crect x='75' y='15' width='10' height='15' fill='%233d3d3d' rx='2'/%3E%3Cpath d='M50 10 L55 20 L45 20 Z' fill='%23f2c94c'/%3E%3C/svg%3E");
            background-size: 150px 150px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            grid-template-rows: 1fr 0.7fr;
            gap: 30px;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Note Space */
        .card-note {
            background-color: #fffdf0;
            border: 1px solid #e8e3d5;
            padding: 0;
            overflow: hidden;
        }
        .note-header {
            padding: 15px 20px 5px 60px;
            color: #b5b0a2;
            font-weight: bold;
        }
        .note-content {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            padding: 0 20px 20px 60px;
            background: 
                linear-gradient(90deg, transparent 54px, #ffb3b3 54px, #ffb3b3 56px, transparent 56px),
                repeating-linear-gradient(transparent, transparent 31px, #e0e0e0 31px, #e0e0e0 32px);
            line-height: 32px;
            font-size: 16px;
            resize: none;
            font-family: inherit;
            background-attachment: local;
        }

        /* Learning Viewer */
        .card-viewer {
            padding: 12px;
            background: #2c2c2c;
            border: 12px solid;
            border-image: var(--gold-gradient) 1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 0 15px rgba(0,0,0,0.5);
        }
        .viewer-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .viewer-controls input {
            flex: 1;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #fff;
            font-size: 12px;
        }
        .viewer-controls button {
            background: var(--gold-gradient);
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #332200;
        }
        iframe {
            flex: 1;
            width: 100%;
            border-radius: 4px;
            border: none;
            background: white;
        }

        /* Tasks Space */
        .card-tasks {
            flex-direction: row;
            gap: 20px;
        }
        .task-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .task-section h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--bg-color);
        }
        .task-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .task-item input[type="checkbox"] {
            accent-color: var(--accent-yellow);
            cursor: pointer;
        }
        .task-item span[contenteditable] {
            flex: 1;
            outline: none;
        }
        .task-item span[contenteditable]:focus {
            background: #fdf6e3;
        }
        .delete-btn {
            opacity: 0.3;
            cursor: pointer;
            border: none;
            background: none;
        }
        .delete-btn:hover { opacity: 1; color: red; }
        
        .add-task {
            display: flex;
            margin-top: 10px;
            gap: 5px;
        }
        .add-task input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .add-task button {
            background: var(--accent-yellow);
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }

        /* Timer Space (Muscat) */
        .card-timer {
            align-items: center;
            justify-content: center;
            background: transparent;
            box-shadow: none;
        }
        .muscat-visual {
            position: relative;
            width: 180px;
            height: 160px;
            margin-bottom: 10px;
        }
        .grape {
            position: absolute;
            width: 50px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, var(--muscat-green), var(--muscat-dark));
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.1);
        }
        .g1 { top: 0; left: 65px; }
        .g2 { top: 25px; left: 35px; }
        .g3 { top: 25px; left: 95px; }
        .g4 { top: 60px; left: 45px; }
        .g5 { top: 60px; left: 85px; }
        .g6 { top: 95px; left: 65px; }
        .stem {
            position: absolute;
            top: -15px;
            left: 85px;
            width: 8px;
            height: 25px;
            background: #4a7c2c;
            border-radius: 4px;
            transform: rotate(-10deg);
        }
        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 10;
        }
        .timer-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
        }
        .timer-btns button {
            padding: 8px;
            border: none;
            border-radius: 10px;
            background: white;
            box-shadow: 0 4px 0 #eee;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.1s;
        }
        .timer-btns button:active { transform: translateY(2px); box-shadow: 0 2px 0 #eee; }
        .btn-start { background-color: #d8f3dc !important; color: #1b4332; }

    </style>
</head>
<body>

    <div class="dashboard">
        <!-- Notebook -->
        <div class="card card-note">
            <div class="note-header">Notes</div>
            <textarea id="notebook" class="note-content" placeholder="メモを書き込もう..."></textarea>
        </div>

        <!-- Viewer -->
        <div class="card card-viewer">
            <div class="viewer-controls">
                <input type="text" id="url-input" placeholder="URLを入力 (例: https://ja.wikipedia.org)">
                <button id="url-btn">開く</button>
            </div>
            <iframe id="viewer-frame" src="about:blank"></iframe>
        </div>

        <!-- Tasks -->
        <div class="card card-tasks">
            <div class="task-section">
                <h3>Goals</h3>
                <ul class="task-list" id="goals-list"></ul>
                <div class="add-task">
                    <input type="text" id="goal-input" placeholder="目標を追加">
                    <button onclick="addTask('goals-list', 'goal-input')">+</button>
                </div>
            </div>
            <div class="task-section">
                <h3>To-Do</h3>
                <ul class="task-list" id="todo-list"></ul>
                <div class="add-task">
                    <input type="text" id="todo-input" placeholder="タスクを追加">
                    <button onclick="addTask('todo-list', 'todo-input')">+</button>
                </div>
            </div>
            <div class="task-section">
                <h3>Schedule</h3>
                <textarea id="schedule-text" class="note-content" style="padding: 10px; font-size: 13px; line-height: 20px; background: none; border: 1px solid #f0f0f0; border-radius: 10px;" placeholder="10:00 読書..."></textarea>
            </div>
        </div>

        <!-- Timer -->
        <div class="card card-timer">
            <div class="muscat-visual">
                <div class="stem"></div>
                <div class="grape g1"></div><div class="grape g2"></div>
                <div class="grape g3"></div><div class="grape g4"></div>
                <div class="grape g5"></div><div class="grape g6"></div>
                <div class="timer-display" id="timer-text">25:00</div>
            </div>
            <div class="timer-btns">
                <button class="btn-start" id="t-start">Start</button>
                <button id="t-break">Break</button>
                <button id="t-reset">Reset</button>
                <button id="t-set">Set</button>
            </div>
        </div>
    </div>

    <script>
        // --- Storage Logic ---
        const saveData = () => {
            const data = {
                note: document.getElementById('notebook').value,
                schedule: document.getElementById('schedule-text').value,
                goals: document.getElementById('goals-list').innerHTML,
                todo: document.getElementById('todo-list').innerHTML
            };
            localStorage.setItem('focus_db_save', JSON.stringify(data));
        };

        const loadData = () => {
            const raw = localStorage.getItem('focus_db_save');
            if (raw) {
                const data = JSON.parse(raw);
                document.getElementById('notebook').value = data.note || "";
                document.getElementById('schedule-text').value = data.schedule || "";
                document.getElementById('goals-list').innerHTML = data.goals || "";
                document.getElementById('todo-list').innerHTML = data.todo || "";
            }
        };

        // --- Task Logic ---
        const addTask = (listId, inputId) => {
            const input = document.getElementById(inputId);
            if (!input.value.trim()) return;
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <input type="checkbox" onchange="saveData()">
                <span contenteditable="true" onblur="saveData()">${input.value}</span>
                <button class="delete-btn" onclick="this.parentElement.remove();saveData();">🗑</button>
            `;
            document.getElementById(listId).appendChild(li);
            input.value = "";
            saveData();
        };

        // --- Timer Logic ---
        let timerSeconds = 1500;
        let timerInterval = null;

        const updateDisplay = () => {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-text').textContent = `${m}:${s}`;
        };

        const startTimer = () => {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('t-start').textContent = 'Start';
                return;
            }
            document.getElementById('t-start').textContent = 'Pause';
            timerInterval = setInterval(() => {
                if (timerSeconds > 0) {
                    timerSeconds--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert("Time is up!");
                }
            }, 1000);
        };

        // --- Event Listeners ---
        document.getElementById('url-btn').addEventListener('click', () => {
            let url = document.getElementById('url-input').value;
            if (url && !url.startsWith('http')) url = 'https://' + url;
            document.getElementById('viewer-frame').src = url;
        });

        document.getElementById('t-start').addEventListener('click', startTimer);
        document.getElementById('t-break').addEventListener('click', () => {
            clearInterval(timerInterval); timerInterval = null;
            timerSeconds = 300; updateDisplay(); startTimer();
        });
        document.getElementById('t-reset').addEventListener('click', () => {
            clearInterval(timerInterval); timerInterval = null;
            timerSeconds = 1500; updateDisplay();
            document.getElementById('t-start').textContent = 'Start';
        });
        document.getElementById('t-set').addEventListener('click', () => {
            const mins = prompt("分数を入力してください:", "25");
            if (mins && !isNaN(mins)) {
                timerSeconds = parseInt(mins) * 60;
                updateDisplay();
            }
        });

        document.getElementById('notebook').addEventListener('input', saveData);
        document.getElementById('schedule-text').addEventListener('input', saveData);

        window.onload = loadData;
    </script>
</body>
</html>
