<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>集中作業環境</title>
  <style>

    /* =====================
       リセット・基本設定
    ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
      background-color: #fdf8f0;
      background-image:
        radial-gradient(circle at 20% 20%, #fff8e7 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #f0ece4 0%, transparent 50%);
      min-height: 100vh;
      padding: 20px;
      user-select: none;
    }

    /* =====================
       ページタイトル
    ===================== */
    .page-title {
      text-align: center;
      font-size: 13px;
      color: #a89070;
      letter-spacing: 4px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    /* =====================
       メイングリッド
    ===================== */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      height: calc(100vh - 80px);
    }

    /* =====================
       カード共通スタイル
    ===================== */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.08),
        0 1px 3px rgba(0,0,0,0.05);
      border: 1px solid #e8e0d0;
      position: relative;
      cursor: grab;
      transition: box-shadow 0.2s ease;
    }

    .card:active {
      cursor: grabbing;
      box-shadow:
        0 8px 24px rgba(0,0,0,0.15),
        0 3px 8px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 13px;
      font-weight: bold;
      color: #8b7355;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #d4c4a0;
    }

    /* =====================
       ① ノートエリア（左上）
    ===================== */
    .note-card {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      background: #fffef8;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        #e8e4d8 27px,
        #e8e4d8 28px
      );
      background-position: 0 44px;
    }

    .note-card::before {
      content: '';
      position: absolute;
      left: 48px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #f0b8b8;
      opacity: 0.5;
      border-radius: 0;
    }

    /* リング風装飾 */
    .note-rings {
      position: absolute;
      top: 0;
      left: -8px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-top: 20px;
    }

    .ring {
      width: 16px;
      height: 16px;
      border: 3px solid #c0b090;
      border-radius: 50%;
      background: #fdf8f0;
    }

    .note-card .card-title {
      padding-left: 20px;
      font-size: 16px;
      font-style: italic;
      color: #b0a080;
      border-bottom: none;
      margin-bottom: 4px;
    }

    .note-textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Georgia', serif;
      font-size: 14px;
      line-height: 28px;
      color: #4a4035;
      resize: none;
      padding: 0 12px 0 20px;
      cursor: text;
    }

    /* =====================
       右側コンテナ
    ===================== */
    .right-column {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* =====================
       ② 教材スペース（右上）
    ===================== */
    .material-card {
      flex: 1;
      padding: 12px;
      background: #1a1208;
      border-radius: 4px;
      position: relative;
      box-shadow:
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 0 0 3px #8b6914,
        inset 0 0 0 6px #c9940a,
        inset 0 0 0 9px #8b6914,
        inset 0 0 0 12px #e8b422,
        inset 0 0 0 14px #8b6914;
      cursor: grab;
    }

    /* 額縁コーナー装飾 */
    .material-card::before,
    .material-card::after {
      content: '❧';
      position: absolute;
      font-size: 20px;
      color: #e8b422;
      line-height: 1;
    }

    .material-card::before {
      top: 6px;
      left: 8px;
    }

    .material-card::after {
      bottom: 6px;
      right: 8px;
      transform: rotate(180deg);
    }

    .frame-corner-tr {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 20px;
      color: #e8b422;
      transform: scaleX(-1);
    }

    .frame-corner-bl {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 20px;
      color: #e8b422;
      transform: scaleY(-1);
    }

    .material-label {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #c9940a, #e8b422, #c9940a);
      color: #1a1208;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 2px 16px;
      border-radius: 10px;
      white-space: nowrap;
      z-index: 10;
    }

    .material-iframe-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      overflow: hidden;
      background: #f5f0e8;
    }

    .material-iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #f5f0e8;
    }

    /* iframeプレースホルダー */
    .iframe-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f0e8, #ede8de);
      color: #a09070;
      font-size: 13px;
      text-align: center;
      gap: 12px;
      border-radius: 2px;
    }

    .iframe-placeholder .icon {
      font-size: 40px;
      opacity: 0.5;
    }

    .iframe-placeholder p {
      line-height: 1.8;
      font-style: italic;
    }

    /* =====================
       ③ ポモドーロタイマー（右下）
    ===================== */
    .timer-card {
      background: linear-gradient(135deg, #fff5f5, #fff0ee);
      border: 1px solid #f0d0c8;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      flex-shrink: 0;
    }

    /* トマトイラスト */
    .tomato-wrap {
      position: relative;
      width: 70px;
      height: 70px;
      flex-shrink: 0;
    }

    .tomato-body {
      width: 68px;
      height: 60px;
      background: radial-gradient(circle at 35% 35%, #ff6b5b, #cc2200);
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      position: absolute;
      bottom: 0;
      left: 0;
      box-shadow: inset -8px -4px 12px rgba(0,0,0,0.2);
    }

    .tomato-stem {
      width: 8px;
      height: 14px;
      background: linear-gradient(to bottom, #3a8c2a, #2d6e20);
      border-radius: 4px 4px 2px 2px;
      position: absolute;
      top: 0;
      left: 30px;
    }

    .tomato-leaf {
      width: 18px;
      height: 10px;
      background: linear-gradient(135deg, #4aaa30, #2d8020);
      border-radius: 50% 0 50% 0;
      position: absolute;
      top: 6px;
      left: 34px;
      transform: rotate(-30deg);
    }

    /* タイマー表示 */
    .timer-display-wrap {
      flex: 1;
    }

    .timer-label {
      font-size: 11px;
      color: #c08070;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .timer-display {
      font-size: 52px;
      font-weight: bold;
      color: #cc2200;
      font-family: 'Courier New', monospace;
      line-height: 1;
      letter-spacing: 2px;
      text-shadow: 2px 2px 4px rgba(200,50,0,0.2);
    }

    /* タイマーボタン */
    .timer-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-start {
      background: linear-gradient(135deg, #5cb85c, #3d8b3d);
      color: white;
    }

    .btn-reset {
      background: linear-gradient(135deg, #d9534f, #a02020);
      color: white;
    }

    /* =====================
       ④ 作業計画（下段）
    ===================== */
    .plan-card {
      grid-column: 1 / 3;
      grid-row: 2;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #fffef5, #fdf8e8);
      border: 1px solid #e0d4a0;
      flex-shrink: 0;
    }

    .plan-section-title {
      font-size: 11px;
      font-weight: bold;
      color: #8b7040;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #d4b860;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .plan-section-title .icon {
      font-size: 14px;
    }

    /* 目標リスト */
    .goal-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .goal-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #5a4a30;
    }

    .goal-list li input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #8b7040;
      cursor: pointer;
    }

    /* 目次リスト */
    .toc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toc-list li {
      font-size: 13px;
      color: #5a4a30;
      padding: 4px 8px;
      background: rgba(212,184,96,0.1);
      border-radius: 4px;
      border-left: 3px solid #d4b860;
    }

    /* 時間割 */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .schedule-table tr {
      border-bottom: 1px dashed #e0d4a0;
    }

    .schedule-table td {
      padding: 4px 6px;
      color: #5a4a30;
    }

    .schedule-table td:first-child {
      color: #8b7040;
      font-weight: bold;
      width: 50px;
      white-space: nowrap;
    }

  </style>
</head>
<body>

  <p class="page-title">✦ Focus Space ✦</p>

  <div class="main-grid">

    <!-- ① ノートエリア（左上） -->
    <div class="card note-card" id="noteCard">
      <div class="note-rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="card-title">Notes</div>
      <textarea
        class="note-textarea"
        placeholder="ここにメモを書いてください..."
      ></textarea>
    </div>

    <!-- 右カラム（教材 + タイマー） -->
    <div class="right-column">

      <!-- ② 教材スペース（右上） -->
      <div class="material-card" id="materialCard">
        <span class="material-label">📖 教材スペース</span>
        <span class="frame-corner-tr">❧</span>
        <span class="frame-corner-bl">❧</span>
        <div class="material-iframe-wrapper">
          <div class="iframe-placeholder">
            <div class="icon">🖼️</div>
            <p>教材サイトのURLをここに表示できます<br>iframe に URL を設定してください</p>
          </div>
          <!-- 使用時は以下のコメントを解除してURLを設定 -->
          <!-- <iframe src="https://example.com" title="教材"></iframe> -->
        </div>
      </div>

      <!-- ③ ポモドーロタイマー（右下） -->
      <div class="card timer-card" id="timerCard">
        <div class="tomato-wrap">
          <div class="tomato-stem"></div>
          <div class="tomato-leaf"></div>
          <div class="tomato-body"></div>
        </div>
        <div class="timer-display-wrap">
          <div class="timer-label">🍅 Pomodoro Timer</div>
          <div class="timer-display">25:00</div>
        </div>
        <div class="timer-buttons">
          <button class="btn btn-start">▶ Start</button>
          <button class="btn btn-reset">↺ Reset</button>
        </div>
      </div>

    </div>

    <!-- ④ 作業計画（下段・横長） -->
    <div class="card plan-card" id="planCard">

      <!-- 今日の目標 -->
      <div class="plan-section">
        <div class="plan-section-title">
          <span class="icon">🎯</span> 今日の目標
        </div>
        <ul class="goal-list">
          <li><input type="checkbox" /> 目標①を入力してください</li>
          <li><input type="checkbox" /> 目標②を入力してください</li>
          <li><input type="checkbox" /> 目標③を入力してください</li>
        </ul>
      </div>

      <!-- 目次 -->
      <div class="plan-section">
        <div class="plan-section-title">
          <span class="icon">📋</span> 目次 / To-Do
        </div>
        <ul class="toc-list">
          <li>第1章：〇〇について</li>
          <li>第2章：△△について</li>
          <li>第3章：□□について</li>
        </ul>
      </div>

      <!-- 時間割 -->
      <div class="plan-section">
        <div class="plan-section-title">
          <span class="icon">🕐</span> 時間割
        </div>
        <table class="schedule-table">
          <tr><td>10:00</td><td>勉強・作業①</td></tr>
          <tr><td>11:00</td><td>休憩</td></tr>
          <tr><td>11:30</td><td>勉強・作業②</td></tr>
          <tr><td>13:00</td><td>振り返り</td></tr>
        </table>
      </div>

    </div>

  </div>

</body>
</html>
